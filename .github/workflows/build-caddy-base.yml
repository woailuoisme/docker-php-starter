name: Build Caddy Base Multi-arch Images

on:
  workflow_dispatch:
    inputs:
      build_base:
        description: "是否构建 caddy-base (Alpine 2.11.4)"
        type: boolean
        default: true
      caddy_base_version:
        description: "caddy-base 的版本标签"
        required: true
        default: "2.11.4"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          BUILD_BASE: ${{ inputs.build_base }}
          CADDY_BASE_VERSION: ${{ inputs.caddy_base_version }}
        run: |
          MATRIX_JSON='{"include":[]}'
          if [ "$BUILD_BASE" = "true" ]; then
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq --arg ver "$CADDY_BASE_VERSION" '.include += [{"name": "caddy-base", "dir": "caddy-base", "repo": "caddy-base", "version": $ver}]')
          fi
          echo "matrix=$(echo "$MATRIX_JSON" | jq -c .)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: fromJson(needs.prepare.outputs.matrix).include[0] != null
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    env:
      REGISTRY_DOCKERHUB: docker.io/jiaoio
      REGISTRY_REDHAT: quay.io/jiaoio
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: setup-buildx

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to RedHat Registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_TOKEN }}

      - name: Cache Go modules
        uses: actions/cache@v4
        id: cache-go
        with:
          path: go-cache
          key: go-cache-${{ matrix.name }}-${{ hashFiles(format('{0}/Dockerfile', matrix.dir)) }}
          restore-keys: |
            go-cache-${{ matrix.name }}-

      - name: Inject Go cache into Buildx
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            {
              "go-cache": "/go/pkg/mod"
            }
          skip-extraction: ${{ steps.cache-go.outputs.cache-hit }}

      - name: Build and Push ${{ matrix.name }}
        env:
          MATRIX_DIR: ${{ matrix.dir }}
          MATRIX_REPO: ${{ matrix.repo }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          cd "$MATRIX_DIR" && docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg CHANGE_SOURCE=false \
            --tag "$REGISTRY_DOCKERHUB/$MATRIX_REPO:$MATRIX_VERSION" \
            --tag "$REGISTRY_REDHAT/$MATRIX_REPO:$MATRIX_VERSION" \
            --push \
            .
