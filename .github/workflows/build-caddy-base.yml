name: Build Caddy Base Multi-arch Images

on:
  workflow_dispatch:
    inputs:
      build_base:
        description: "是否构建 caddy-base (Alpine 2.11.3)"
        type: boolean
        default: true
      caddy_base_version:
        description: "caddy-base 的版本标签"
        required: true
        default: "2.11.3"
      build_base_trixie:
        description: "是否构建 caddy-base-trixie (Trixie 2.11.3)"
        type: boolean
        default: true
      caddy_base_trixie_version:
        description: "caddy-base-trixie 的版本标签"
        required: true
        default: "trixie-2.11.3"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX_JSON='{"include":[]}'
          if [ "${{ inputs.build_base }}" == "true" ]; then
            MATRIX_JSON=$(echo $MATRIX_JSON | jq '.include += [{"name": "caddy-base", "dir": "caddy-base", "repo": "caddy-base", "version": "${{ inputs.caddy_base_version }}"}]')
          fi
          if [ "${{ inputs.build_base_trixie }}" == "true" ]; then
            MATRIX_JSON=$(echo $MATRIX_JSON | jq '.include += [{"name": "caddy-base-trixie", "dir": "caddy-base-trixie", "repo": "caddy-base", "version": "${{ inputs.caddy_base_trixie_version }}"}]')
          fi
          echo "matrix=$(echo $MATRIX_JSON | jq -c .)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: fromJson(needs.prepare.outputs.matrix).include[0] != null
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    env:
      REGISTRY_DOCKERHUB: docker.io/jiaoio
      REGISTRY_REDHAT: quay.io/jiaoio
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: setup-buildx

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to RedHat Registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_TOKEN }}

      - name: Cache Go modules
        uses: actions/cache@v4
        id: cache-go
        with:
          path: go-cache
          key: go-cache-${{ matrix.name }}-${{ hashFiles(format('{0}/Dockerfile', matrix.dir)) }}
          restore-keys: |
            go-cache-${{ matrix.name }}-

      - name: Inject Go cache into Buildx
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: go-cache
          cache-target: /go/pkg/mod
          skip-extraction: ${{ steps.cache-go.outputs.cache-hit }}

      - name: Build and Push ${{ matrix.name }}
        run: |
          cd ${{ matrix.dir }} && docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg CHANGE_SOURCE=false \
            --tag $REGISTRY_DOCKERHUB/${{ matrix.repo }}:${{ matrix.version }} \
            --tag $REGISTRY_REDHAT/${{ matrix.repo }}:${{ matrix.version }} \
            --push \
            .
