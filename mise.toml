# mise.toml - mise 工具链和环境变量管理配置文件
# 官方参考文档：https://mise.jdx.dev/configuration.html

[tools]
# 项目开发任务运行器
just = "latest"

# Dockerfile 静态分析工具
hadolint = "latest"

# Shell 脚本静态分析工具
shellcheck = "latest"

# Shell 脚本格式化工具
shfmt = "latest"

# Git Hooks 管理器
lefthook = "latest"

# 容器镜像仓库工具 (通过 go install 安装)
"go:go.podman.io/skopeo/cmd/skopeo" = "latest"

# 高效文件查找与搜索工具 (用于自动化 lint 脚本)
fd = "latest"
ripgrep = "latest"
sd = "latest"

[env]
# 自动加载项目本地的 .env 配置文件，使 shell 终端能直接使用相应的环境变量
_.file = ".env"
